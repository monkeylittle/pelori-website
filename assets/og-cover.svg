<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Pelori — Group cycling, planned together">
  <defs>
    <!-- Background gradient: Velero Electric Blue with a subtle bloom -->
    <radialGradient id="bg" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#1f7bff"/>
      <stop offset="60%" stop-color="#0066ff"/>
      <stop offset="100%" stop-color="#0052cc"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4ff3a"/>
      <stop offset="100%" stop-color="#bfff14"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles to give the card depth without clutter -->
  <circle cx="1080" cy="120" r="220" fill="white" fill-opacity="0.06"/>
  <circle cx="1180" cy="540" r="160" fill="white" fill-opacity="0.04"/>

  <!-- Wordmark -->
  <text x="80" y="280" fill="white"
        font-family="Bricolage Grotesque, system-ui, sans-serif"
        font-weight="800" font-size="160" letter-spacing="-7">pelori</text>

  <!-- Hi-vis accent dot at the end of the wordmark, mirroring the
       launcher icon language -->
  <circle cx="640" cy="270" r="14" fill="url(#accent)"/>

  <!-- Tagline -->
  <text x="80" y="380" fill="white" fill-opacity="0.92"
        font-family="DM Sans, system-ui, sans-serif"
        font-weight="500" font-size="48" letter-spacing="-1">Group cycling,</text>
  <text x="80" y="438" fill="white" fill-opacity="0.92"
        font-family="DM Sans, system-ui, sans-serif"
        font-weight="500" font-size="48" letter-spacing="-1">planned together.</text>

  <!-- Footer URL -->
  <text x="80" y="560" fill="white" fill-opacity="0.7"
        font-family="DM Sans, system-ui, sans-serif"
        font-weight="600" font-size="22" letter-spacing="0.5">pelori.fit</text>
</svg>
